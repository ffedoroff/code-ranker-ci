# .github/workflows/code-ranker.yml
#
# Thin caller stub. Copy this into your repository as
# `.github/workflows/code-ranker.yml`. This is the EXACT file the code-ranker
# onboarding PR adds for you -- all real logic lives in the reusable workflow
# pinned at @v1, so you never have to touch it again. We ship updates by moving
# the v1 tag.
#
# No secrets are required: identity is proven via keyless OIDC.
name: code-ranker
on:
  pull_request:
  push:
    branches: [main]
jobs:
  report:
    uses: ffedoroff/code-ranker-ci/.github/workflows/report.yml@v1
    permissions:
      id-token: write        # OIDC, keyless -- no secret needed
      contents: read         # checkout your code for analysis
      pull-requests: write   # sticky comment with the report link

# -----------------------------------------------------------------------------
