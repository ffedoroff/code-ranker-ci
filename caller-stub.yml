#      generated HTML as an ORDINARY artifact (no OIDC, no secrets). Because the
#      analysis runs inside the reusable workflow, the simplest way to add this
#      is to NOT use `uses:` for the report job and instead inline the steps;
#      most users do not need fork support and can ignore this section.
#
#      If you do inline the job, append these two steps after the analysis step
#      (they only fire for fork PRs, where the same-repo upload was skipped):
