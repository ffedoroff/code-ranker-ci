#      ORDINARY artifact (no OIDC, no secrets). Because the analysis runs inside
#      the reusable workflow, the simplest way is to NOT use `uses:` for the job
#      and inline the steps; most users do not need fork support.
#
#      If you inline the job, append these two steps after the analysis step
#      (they only fire for fork PRs, where the same-repo upload was skipped):
