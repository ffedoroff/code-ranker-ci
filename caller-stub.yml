# .github/workflows/code-ranker.yml
#
# Thin caller stub. This is the EXACT file the code-ranker onboarding PR adds for
# you -- all real logic lives in the reusable workflow pinned at @v1, so you never
# edit it. We ship updates by moving the v1 tag.
#
# The onboarding PR fills `matrix.language` with the languages it detected in your
# repo that code-ranker supports (one job per language). The list below is just an
# example -- yours will match your repo.
#
# No secrets are required: identity is proven via keyless OIDC.
name: code-ranker
on:
  pull_request:
  push:
jobs:
  code-ranker:
    name: code-ranker (${{ matrix.language }})   # clean per-language check name
    # Runs on every PR and on pushes to ANY branch, so stat-diffs build on feature
    # branches too. The diff baseline is the default-branch snapshot, refreshed by
    # report.yml on default-branch pushes and read everywhere via the Actions cache.
    strategy:
      fail-fast: false          # one language failing must not cancel the others
      matrix:
        # One editable line per language: flip do_check to false to make a
        # language advisory-only, or pr_comment to false to drop it from the PR
        # comment. Filled by the onboarding PR from detected languages.
        include:
          - { language: rust,       do_report: true, do_check: true, pr_comment: true }
          - { language: javascript, do_report: true, do_check: true, pr_comment: true }
          - { language: markdown,   do_report: true, do_check: true, pr_comment: true }
    uses: ffedoroff/code-ranker-ci/.github/workflows/report.yml@v1
    with:
      language: ${{ matrix.language }}
      do_report: ${{ matrix.do_report }}     # advisory HTML report (never fails CI)
      do_check: ${{ matrix.do_check }}       # lint gate: red job on violations (see note)
      pr_comment: ${{ matrix.pr_comment }}   # contribute to the single PR comment
    permissions:
      id-token: write           # OIDC, keyless -- no secret needed
      contents: read            # checkout your code for analysis
      pull-requests: write      # sticky comment with the report link
  # Aggregates every language's result into ONE PR comment (updated in place).
  comment:
    needs: code-ranker
    if: ${{ always() && github.event_name == 'pull_request' }}
    uses: ffedoroff/code-ranker-ci/.github/workflows/comment.yml@v1
    permissions:
      pull-requests: write      # post / update the single comment
      actions: read             # download the per-language staged artifacts

# -----------------------------------------------------------------------------
# do_check / branch protection
# -----------------------------------------------------------------------------
# With `do_check: true`, a language's job goes RED when code-ranker finds
# violations. This shows a failing check on the PR but does NOT block merging
# unless you mark `code-ranker (<language>)` as a REQUIRED status check in your
# branch protection / ruleset. Set `do_check: false` to keep a language advisory.
#
# -----------------------------------------------------------------------------
# OPTIONAL: fork-PR support
# -----------------------------------------------------------------------------
