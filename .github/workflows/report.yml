# ffedoroff/code-ranker-ci :: .github/workflows/report.yml
#
# Reusable workflow, run on the CLIENT's runner. For ONE language (the `language`
# input) it analyzes the repo ONCE into a JSON snapshot, then derives from that
# single snapshot:
#   - the advisory HTML report, keyless-uploaded to the backend over OIDC. Never
#     fails the build (per-step continue-on-error), and
#   - the lint "check" verdict: a non-zero exit on violations turns the job RED so
#     a language's job can be made a REQUIRED status check in branch protection.
#
# Re-reading the snapshot for the check means `cargo metadata` / source parsing
# run at most ONCE per job, not twice. Callers fan out one job per language with a
# matrix, each calling this file with a different `language`. There is NO secret
# here: identity is keyless OIDC. Clients pin a thin caller stub at @v1; we ship
# changes centrally by moving the v1 tag.
name: code-ranker

on:
  workflow_call:
    inputs:
      language:
        description: >-
          code-ranker plugin to run: rust | javascript | typescript | python |
          go | c | cpp | csharp | markdown. Empty = auto-detect (the legacy
          single-plugin behaviour; errors in multi-language repos).
        required: false
        type: string
        default: ""
      do_report:
        description: Generate + upload the advisory HTML report (never fails CI).
        required: false
        type: boolean
        default: true
      do_check:
        description: >-
          Run the lint gate. When true, violations make THIS job red so it can be
          required in branch protection. When false the job stays advisory.
        required: false
        type: boolean
        default: false
      comment:
        description: Post / update the sticky PR comment with the report link.
        required: false
        type: boolean
        default: true
      api_url:
        description: Optional override for the upload endpoint.
        required: false
        type: string
        default: ""

env:
  API_UPLOAD_URL: "https://api.code-ranker.com/upload"

# One in-flight run per PR/ref PER LANGUAGE. The language must be in the group key
# or concurrent matrix jobs (rust, js, ...) of the same PR would cancel each other.
concurrency:
  group: code-ranker-${{ inputs.language }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-ranker:
    name: ${{ inputs.language || 'code-ranker' }}
    runs-on: ubuntu-22.04
    # No job-level continue-on-error: the advisory steps (report/upload/comment)
    # opt out per-step, so ONLY the check gate can fail the job. Permissions are
    # declared by the CALLER stub (a reusable workflow cannot widen them):
    # id-token: write, contents: read, pull-requests: write.
    steps:
      - uses: actions/checkout@v4

      # Install code-ranker: prebuilt binary via the shell installer. One step,
      # seconds, no Rust toolchain for the (usually non-Rust) target repo.
      - name: Install code-ranker (prebuilt binary)
        run: |
          curl -fsSL https://github.com/ffedoroff/code-ranker/releases/latest/download/code-ranker-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # Rust-only: code-ranker's Rust plugin reads the dependency graph via
      # `cargo metadata --offline`, which needs cargo's local cache warm. Every
      # other language walks the filesystem and needs no setup. Gated on the
      # language input; the hashFiles fallback covers legacy auto-detect (empty
      # input) and a multi-language repo's non-Rust jobs skip this entirely.
      - name: Warm Cargo cache (Rust only)
        if: inputs.language == 'rust' || (inputs.language == '' && hashFiles('Cargo.toml') != '')
        run: cargo fetch --manifest-path Cargo.toml

      # Analyze the repo ONCE -> JSON snapshot + HTML report in a single
      # invocation (so `cargo metadata` runs at most once). The check gate below
      # re-reads snap.json instead of re-analyzing. A detached checkout loses git
      # metadata, so branch/commit/origin are passed explicitly.
      - name: Analyze -> snapshot + HTML
        # Report-only mode must never break the client's CI; gating mode lets a
        # broken analysis fail the job.
        continue-on-error: ${{ inputs.do_check != true }}
        env:
          LANGUAGE: ${{ inputs.language }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          H="$(git rev-parse --short=12 HEAD)"; echo "H=$H" >> "$GITHUB_ENV"
          BR="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          PLUGIN_ARG=()
          [ -n "$LANGUAGE" ] && PLUGIN_ARG=(--plugin="$LANGUAGE")
          code-ranker report . \
            "${PLUGIN_ARG[@]}" \
            --git.branch="$BR" \
            --git.commit="${PR_HEAD_SHA:-$GITHUB_SHA}" \
            --git.dirty-files=0 \
            --git.origin="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --output.json.path="snap.json" \
            --output.html.path="report-${H}.html"

      # Violations count for the badge / upload metadata, derived from the SAME
      # snapshot (no re-analysis). --exit-zero so the verdict never fails this
      # advisory step.
      - name: Count violations
        if: inputs.do_report
        continue-on-error: true
        run: |
          set -uo pipefail
          JSON="$(code-ranker check snap.json --output-format json --exit-zero 2>/dev/null || true)"
          if [ -z "$JSON" ]; then
            VIOLATIONS=0
          else
            VIOLATIONS="$(printf '%s' "$JSON" | jq 'if type=="array" then length else (.violations | length) end' 2>/dev/null || echo 0)"
          fi
          echo "VIOLATIONS=${VIOLATIONS:-0}" >> "$GITHUB_ENV"

      # Same-repo only: fork PRs get NO id-token, so upload is skipped for forks
      # (the privileged fork path is fork-report.yml). Advisory: continue-on-error.
      - name: Upload to code-ranker (OIDC, keyless)
        if: >-
          inputs.do_report &&
          (github.event.pull_request.head.repo.full_name == github.repository
           || github.event_name == 'push')
        id: up
        continue-on-error: true
        env:
          API_URL: ${{ inputs.api_url != '' && inputs.api_url || env.API_UPLOAD_URL }}
          LANGUAGE: ${{ inputs.language }}
        run: |
          set -euo pipefail
          # 1) request an OIDC token with OUR custom audience (env vars exposed
          #    only when the job has id-token: write).
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=code-ranker-reports" \
            | jq -r .value)
          # 2) POST the HTML + JWT, capturing body + HTTP status.
          OUT=$(curl -sS -w $'\n%{http_code}' -X POST "$API_URL" \
            -H "Authorization: Bearer $TOKEN" \
            -F "pr=${{ github.event.pull_request.number }}" \
            -F "language=${LANGUAGE:-}" \
            -F "violations=${VIOLATIONS:-0}" \
            -F "report=@report-${H}.html;type=text/html")
          CODE="${OUT##*$'\n'}"; BODY="${OUT%$'\n'*}"
          if [ "$CODE" = "200" ]; then
            URL=$(printf '%s' "$BODY" | jq -r .url)
            echo "url=$URL" >> "$GITHUB_OUTPUT"
          elif [ "$CODE" = "403" ] && printf '%s' "$BODY" | jq -e '.error=="needs_email_verification"' >/dev/null 2>&1; then
            MSG=$(printf '%s' "$BODY" | jq -r '.message')
            DASH=$(printf '%s' "$BODY" | jq -r '.dashboard_url')
            echo "::error title=code-ranker not activated::${MSG} Activate here: ${DASH}"
            echo "verify_url=${DASH}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=code-ranker upload failed::HTTP ${CODE}: ${BODY}"
          fi

      # Comment only on PRs and only when an upload returned a URL. Per-language
      # header so each language updates its own comment instead of overwriting.
      - name: Sticky comment
        if: github.event_name == 'pull_request' && inputs.comment && steps.up.outputs.url != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-ranker-${{ inputs.language }}
          message: "code-ranker (${{ inputs.language || 'report' }}) report: ${{ steps.up.outputs.url }}"

      - name: Sticky comment (activate)
        if: github.event_name == 'pull_request' && inputs.comment && steps.up.outputs.verify_url != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-ranker-${{ inputs.language }}
          message: "🔒 code-ranker is set up but not activated. Activate your email to publish reports: ${{ steps.up.outputs.verify_url }}"

      # Lint gate (do_check=true). Reads the SAME snapshot (no re-analysis, no
      # second cargo metadata) and emits GitHub annotations; a non-zero exit on
      # violations turns this job RED so it can be a required status check. Runs
      # LAST so the advisory report/comment above are already posted.
      - name: Check (lint gate)
        if: inputs.do_check
        run: code-ranker check snap.json --output-format github
