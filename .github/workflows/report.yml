# ffedoroff/code-ranker-ci :: .github/workflows/report.yml
#
# Reusable workflow, run on the CLIENT's runner. code-ranker v5 analyzes ALL
# languages in a single pass, so this is ONE job (no matrix): one analysis →
# snapshot, from which it
#   - generates an HTML report (a diff vs the default-branch baseline when one
#     exists) and keyless-uploads it over OIDC (advisory);
#   - posts ONE sticky PR comment: header (ok / N errors), a View-report button, a
#     <details> per language (its violations + stat-diff), baseline line, AI prompt;
#   - runs the lint gate `check` (do_check) — non-zero exit reds the job.
#
# Baseline = the default-branch snapshot, kept in the Actions cache (single key);
# default-branch pushes refresh it, every branch/PR reads it (cache scope), so the
# stat-diff works on any branch. NO secret: identity is keyless OIDC. Clients pin a
# thin caller stub at @v1; we ship changes by moving the tag.
name: code-ranker

on:
  workflow_call:
    inputs:
      do_report:
        description: Generate + keyless-upload the HTML report (the View-report button).
        required: false
        type: boolean
        default: true
      do_check:
        description: Run the lint gate (non-zero exit reds the job). false = advisory only.
        required: false
        type: boolean
        default: true
      pr_comment:
        description: Post / update the single sticky PR comment.
        required: false
        type: boolean
        default: true
      sarif:
        description: Upload SARIF to code scanning (inline PR alerts). Needs code scanning enabled.
        required: false
        type: boolean
        default: true
      runs_on:
        description: Runner label for the job.
        required: false
        type: string
        default: "ubuntu-22.04"
      install_from_source:
        description: >-
          Build code-ranker from the checked-out repo instead of downloading the
          released binary. For code-ranker's OWN dogfood: it runs the public CI
          scripts against its branch sources. Needs a Rust workspace in the repo.
        required: false
        type: boolean
        default: false
      api_url:
        description: Optional override for the upload endpoint.
        required: false
        type: string
        default: ""

env:
  API_UPLOAD_URL: "https://api.code-ranker.com/upload"
  # v5 is a prerelease, so `releases/latest` still points at v4 — pin the installer
  # to the v5 tag until v5 becomes the latest stable release.
  CR_INSTALLER: "https://github.com/ffedoroff/code-ranker/releases/download/v5.0.0-pre-alpha/code-ranker-installer.sh"

concurrency:
  group: code-ranker-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-ranker:
    runs-on: ${{ inputs.runs_on }}
    # No job-level continue-on-error: advisory steps (render-diff/upload/comment)
    # opt out per-step; only the check gate (and a broken analysis) fail the job.
    # Permissions come from the CALLER stub: id-token: write, contents: read,
    # pull-requests: write.
    steps:
      - uses: actions/checkout@v4

      # Default: install the prebuilt binary (seconds, no toolchain).
      - name: Install code-ranker (prebuilt binary)
        if: ${{ !inputs.install_from_source }}
        run: |
          curl -fsSL "$CR_INSTALLER" | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # Dogfood path: build code-ranker from the checked-out branch sources.
      - name: Rust toolchain (source build)
        if: inputs.install_from_source
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache (source build)
        if: inputs.install_from_source
        uses: Swatinem/rust-cache@v2
      - name: Build code-ranker from source
        if: inputs.install_from_source
        run: |
          cargo build --release -p code-ranker --locked
          echo "$PWD/target/release" >> "$GITHUB_PATH"

      # Rust (if present): the Rust plugin reads the graph via `cargo metadata
      # --offline`, which needs cargo's local cache warm. No-op for repos without
      # a Cargo.toml.
      - name: Warm Cargo cache (Rust projects)
        if: hashFiles('Cargo.toml') != ''
        run: cargo fetch --manifest-path Cargo.toml

      # Analyze ALL languages once (v5 auto-detect; no --plugins) -> snapshot + HTML.
      - name: Analyze -> snapshot + HTML
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          H="$(git rev-parse --short=12 HEAD)"; echo "H=$H" >> "$GITHUB_ENV"
          BR="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          code-ranker report . \
            --git.branch="$BR" --git.commit="${PR_HEAD_SHA:-$GITHUB_SHA}" \
            --git.dirty-files=0 --git.origin="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --output.json.path="snap.json" --output.html.path="report-${H}.html" \
            --output.sarif.path="report-${H}.sarif"
          echo "REPORT_FILE=report-${H}.html" >> "$GITHUB_ENV"
          echo "REPORT_KIND=report" >> "$GITHUB_ENV"

      # Inline alerts in the PR diff + Security → Code scanning. Same-repo only
      # (fork PRs get a read-only token); advisory — a miss never fails the job.
      - name: Upload SARIF to code scanning
        if: >-
          always() && inputs.sarif && hashFiles(format('report-{0}.sarif', env.H)) != '' &&
          (github.event_name == 'push'
           || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report-${{ env.H }}.sarif

      # Default-branch baseline snapshot (single key; cache scope lets any branch/PR
      # read the default-branch cache). Empty on the first run -> diff "no baseline".
      - name: Restore baseline snapshot
        uses: actions/cache/restore@v4
        with:
          path: baseline
          key: ck-baseline-${{ github.sha }}
          restore-keys: |
            ck-baseline-

      # Incompatible snapshot schema major -> drop the baseline so the diff falls
      # back to "no baseline" instead of producing misleading numbers.
      - name: Check baseline version compatibility
        continue-on-error: true
        run: |
          set -uo pipefail
          if [ -f baseline/snap.json ]; then
            CUR=$(jq -r '.schema_version // "0"' snap.json | cut -d. -f1)
            BAS=$(jq -r '.schema_version // "0"' baseline/snap.json | cut -d. -f1)
            if [ "$CUR" != "$BAS" ]; then
              echo "::notice::baseline schema v$BAS != current v$CUR — diff skipped until default-branch baseline refreshes"
              rm -rf baseline
            fi
          fi

      # Diff HTML report from the two snapshots (no re-analysis; --baseline emits a
      # *-diff.html). The button then offers the diff.
      - name: Render diff report
        continue-on-error: true
        run: |
          set -uo pipefail
          if [ -f baseline/snap.json ]; then
            code-ranker report snap.json --baseline baseline/snap.json \
              --output.html.path="report-${H}.html" >/dev/null 2>&1 || true
            if [ -f "report-${H}-diff.html" ]; then
              echo "REPORT_FILE=report-${H}-diff.html" >> "$GITHUB_ENV"
              echo "REPORT_KIND=diff report" >> "$GITHUB_ENV"
            fi
          fi

      # Violations across all languages from the SAME snapshot (each carries a
      # .language field). With a baseline, `check --baseline` returns
      # {verdict, violations} where violations are only the NEW ones vs the
      # baseline (regressions) — that drives the verdict line in the comment.
      # Without a baseline, it's a plain array of the current violations (review).
      # --exit-zero so this advisory step never fails.
      - name: Collect violations
        continue-on-error: true
        run: |
          set -uo pipefail
          if [ -f baseline/snap.json ]; then
            code-ranker check snap.json --baseline baseline/snap.json --output-format json --exit-zero > viol.json 2>/dev/null || echo '{}' > viol.json
            echo "VERDICT=$(jq -r '.verdict // ""' viol.json 2>/dev/null || echo '')" >> "$GITHUB_ENV"
          else
            code-ranker check snap.json --output-format json --exit-zero > viol.json 2>/dev/null || echo '[]' > viol.json
          fi

      # Same-repo only: fork PRs get NO id-token. Advisory: continue-on-error.
      - name: Upload to code-ranker (OIDC, keyless)
        if: >-
          inputs.do_report &&
          (github.event.pull_request.head.repo.full_name == github.repository
           || github.event_name == 'push')
        id: up
        continue-on-error: true
        env:
          API_URL: ${{ inputs.api_url != '' && inputs.api_url || env.API_UPLOAD_URL }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=code-ranker-reports" | jq -r .value)
          N=$(jq 'if type=="array" then length else (.violations|length) end' viol.json 2>/dev/null || echo 0)
          OUT=$(curl -sS -w $'\n%{http_code}' -X POST "$API_URL" \
            -H "Authorization: Bearer $TOKEN" \
            -F "pr=${{ github.event.pull_request.number }}" \
            -F "violations=${N:-0}" \
            -F "report=@${REPORT_FILE};type=text/html")
          CODE="${OUT##*$'\n'}"; BODY="${OUT%$'\n'*}"
          if [ "$CODE" = "200" ]; then
            echo "url=$(printf '%s' "$BODY" | jq -r .url)" >> "$GITHUB_OUTPUT"
          elif [ "$CODE" = "403" ] && printf '%s' "$BODY" | jq -e '.error=="needs_email_verification"' >/dev/null 2>&1; then
            echo "::error title=code-ranker not activated::$(printf '%s' "$BODY" | jq -r '.message')"
            echo "verify_url=$(printf '%s' "$BODY" | jq -r '.dashboard_url')" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=code-ranker upload failed::HTTP ${CODE}: ${BODY}"
          fi

      # Helper scripts at the EXACT version of this reusable workflow.
      - name: Get code-ranker-ci scripts
        uses: actions/checkout@v4
        with:
          repository: ffedoroff/code-ranker-ci
          ref: ${{ github.job_workflow_sha }}
          path: .ck-ci

      - name: Build comment
        continue-on-error: true
        env:
          URL: ${{ steps.up.outputs.url }}
          VERIFY: ${{ steps.up.outputs.verify_url }}
        run: bash .ck-ci/scripts/build-comment.sh

      # One sticky comment per PR, updated in place (fixed header).
      - name: Sticky comment
        if: github.event_name == 'pull_request' && inputs.pr_comment && hashFiles('comment.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-ranker
          path: comment.md

      # Push: surface the same body in the job summary (no PR to comment on).
      - name: Job summary
        if: github.event_name == 'push' && hashFiles('comment.md') != ''
        run: cat comment.md >> "$GITHUB_STEP_SUMMARY"

      # Default-branch pushes refresh the baseline for every other branch.
      - name: Stage new baseline (default branch)
        if: github.ref_name == github.event.repository.default_branch && github.event_name == 'push'
        run: mkdir -p baseline && cp snap.json baseline/snap.json
      - name: Save baseline snapshot (default branch)
        if: github.ref_name == github.event.repository.default_branch && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: baseline
          key: ck-baseline-${{ github.sha }}

      # Lint gate: reds the job on violations (so it can be a required status
      # check). With a baseline it gates on REGRESSIONS only (relative ratchet:
      # new violations vs the default branch); without one, on all current
      # violations. Reads the SAME snapshot. Runs LAST so the comment is posted.
      - name: Check (lint gate)
        if: inputs.do_check
        run: |
          if [ -f baseline/snap.json ]; then
            code-ranker check snap.json --baseline baseline/snap.json --output-format github
          else
            code-ranker check snap.json --output-format github
          fi
